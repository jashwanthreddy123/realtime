name: CI Pipeline


on:
  push:
    branches:
      - main


env:
  IMAGE_NAME: realtime


jobs:


# =========================
# BUILD JOB
# =========================

  build:

    runs-on: ubuntu-latest


    steps:


      - name: Checkout code
        uses: actions/checkout@v4



      - name: Login to Docker
        uses: docker/login-action@v3

        with:

          username: ${{ secrets.DOCKER_USERNAME }}

          password: ${{ secrets.DOCKER_PASSWORD }}



      - name: Build Docker Image
        run: |

          docker build \
          -t $IMAGE_NAME .



      - name: Tag Docker Image
        run: |

          docker tag \
          $IMAGE_NAME \
          ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}



      - name: Push Image to Docker Hub
        run: |

          docker push \
          ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}





# =========================
# TEST JOB
# =========================


  test:

    needs: build

    runs-on: ubuntu-latest


    steps:


      - name: Checkout code
        uses: actions/checkout@v4



      - name: Login Docker
        uses: docker/login-action@v3

        with:

          username: ${{ secrets.DOCKER_USERNAME }}

          password: ${{ secrets.DOCKER_PASSWORD }}



      - name: Pull Image
        run: |

          docker pull \
          ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}



      - name: Run Container Test
        run: |

          docker run -d \
          --name realtime-test \
          -p 8080:80 \
          ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}



      - name: Test Application
        run: |

          sleep 10

          curl http://localhost:8080



      - name: Stop Test Container
        run: |

          docker stop realtime-test





# =========================
# DEPLOY JOB
# =========================


  deploy:

    needs: test

    runs-on: ubuntu-latest


    steps:


      - name: Checkout code
        uses: actions/checkout@v4



      - name: Configure Kubernetes

        run: |

          mkdir -p ~/.kube

          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config



      - name: Setup kubectl

        uses: azure/setup-kubectl@v4



      - name: Update Deployment Image

        run: |

          kubectl set image deployment/realtime \
          realtime-con=${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }} \
          -n realtime



      - name: Apply Kubernetes Service

        run: |

          kubectl apply -f service.yml



      - name: Check Deployment

        run: |

          kubectl rollout status deployment/realtime -n realtime


          kubectl get pods -n realtime
